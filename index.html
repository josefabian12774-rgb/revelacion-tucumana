<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo Nave — Carga</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes loadingBar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-loading { animation: loadingBar 1.5s infinite linear; }
    </style>
</head>
<body class="bg-[#121212] text-white antialiased font-sans pb-24">

    <div id="reactor-loading" class="fixed inset-0 bg-[#121212] flex flex-col justify-center items-center z-50">
        <div class="text-orange-500 font-mono text-xs tracking-[0.3em] uppercase animate-pulse">Sincronizando sistemas...</div>
        <div class="w-48 h-[2px] bg-zinc-800 mt-4 rounded overflow-hidden relative">
            <div class="absolute inset-0 bg-gradient-to-r from-orange-500 to-amber-400 animate-loading"></div>
        </div>
    </div>

    <div id="reactor-anchored" class="fixed inset-0 bg-black hidden flex-col justify-center items-center z-50 px-4 text-center">
        <div class="max-w-md p-8 rounded-2xl bg-zinc-900 border border-red-900/40 shadow-2xl">
            <h1 class="text-lg font-black text-red-500 uppercase tracking-widest mb-3">🛸 Hangar Nexo</h1>
            <p class="text-zinc-400 text-xs font-normal leading-relaxed">
                Nave en proceso de reabastecimiento. Contactar con <span class="text-white font-bold">Nexo Arquetipo</span> para reactivar el vuelo.
            </p>
        </div>
    </div>

    <div id="reactor-waiting" class="fixed inset-0 bg-[#161412] hidden flex-col justify-center items-center z-50 px-4 text-center">
        <div class="max-w-sm p-6 rounded-xl border border-amber-600/10 bg-zinc-950/90 backdrop-blur-md shadow-2xl">
            <p class="text-amber-400 font-serif text-base tracking-wide italic">Esperando abastecimiento...</p>
        </div>
    </div>

    <div id="reactor-ui" class="opacity-0 transition-opacity duration-500">
        <header class="p-6 text-center border-b border-white/5 bg-black/20">
            <h1 id="nave-title" class="text-2xl font-black uppercase tracking-tight"></h1>
            <p id="nave-tagline" class="text-xs text-zinc-400 mt-1 italic font-light"></p>
        </header>

        <main class="max-w-md mx-auto p-4 mt-6 space-y-10">
            <section id="sec-promos" class="hidden">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></span> 🔥 Promociones del Día
                </h2>
                <div id="grid-promos" class="space-y-3"></div>
            </section>

            <section id="sec-especialidades" class="hidden">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span> ⭐ Especialidades de la Casa
                </h2>
                <div id="grid-especialidades" class="grid grid-cols-1 gap-3"></div>
            </section>

            <section id="sec-menudia" class="hidden">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-zinc-600"></span> 📋 Sugerencia del Chef
                </h2>
                <div id="grid-menudia" class="p-4 rounded-xl border border-zinc-800 bg-zinc-950/40"></div>
            </section>
        </main>
    </div>

    <script>
        // 1. CONFIGURACIÓN DEL CLIENTE SUPABASE (Apunta a tu base existente)
        const SUPABASE_URL = "https://tu-supabase-url.supabase.co"; // Reemplazar con tu URL de Supabase
        const SUPABASE_KEY = "tu-supabase-anon-key"; // Reemplazar con tu anon key de Supabase
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Identificador forzado para esta nave independiente
        const PERFIL_SLUG = "revelacion-tucumana";

        async function encenderReactor() {
            const loadingEl = document.getElementById('reactor-loading');
            const anchoredEl = document.getElementById('reactor-anchored');
            const waitingEl = document.getElementById('reactor-waiting');
            const uiEl = document.getElementById('reactor-ui');

            try {
                // Consulta directa filtrando por la fila que creamos recién
                const { data, error } = await _supabase
                    .from('naves')
                    .select('status, content')
                    .eq('perfil_slug', PERFIL_SLUG)
                    .single();

                if (error || !data) {
                    loadingEl.innerText = "ERROR // FALLA DE TELEMETRÍA";
                    return;
                }

                // Evaluar estados de control de flota
                if (data.status === 'anchored') {
                    loadingEl.classList.add('hidden');
                    anchoredEl.classList.remove('hidden');
                    return;
                }
                if (data.status === 'waiting_pay') {
                    loadingEl.classList.add('hidden');
                    waitingEl.classList.remove('hidden');
                    return;
                }

                // Inyección Camaleónica de Contenido
                const db = data.content;
                
                // Aplicar estilos de la Identidad Visual
                document.body.style.backgroundColor = db.styles?.bg_color || '#121212';
                if(db.styles?.bg_pattern) {
                    document.body.style.backgroundImage = `url('${db.styles.bg_pattern}')`;
                }

                const pColor = db.styles?.primary_color || '#FFD700';
                const aColor = db.styles?.accent_color || '#FFA500';

                // Títulos del Header
                const titleEl = document.getElementById('nave-title');
                titleEl.innerText = db.header?.title || "Nave Nexo";
                titleEl.style.color = pColor;
                document.getElementById('nave-tagline').innerText = db.header?.tagline || "";

                // Renderizado Módulo: PROMOS
                if (db.zones?.promos && db.zones.promos.length > 0) {
                    document.getElementById('sec-promos').classList.remove('hidden');
                    const container = document.getElementById('grid-promos');
                    db.zones.promos.forEach(item => {
                        container.innerHTML += `
                            <div class="relative p-5 rounded-xl border bg-zinc-950/60 transition-all duration-300" style="border-color: ${aColor}15">
                                <div class="absolute top-0 right-0 text-[9px] font-black px-2 py-0.5 rounded-bl-lg text-black" style="background-color: ${aColor}">PROMO</div>
                                <div class="flex justify-between items-start">
                                    <div class="max-w-[75%]">
                                        <h3 class="text-sm font-bold text-white tracking-tight">${item.nombre}</h3>
                                        <p class="text-[11px] text-zinc-400 mt-0.5 font-light leading-relaxed">${item.descripcion}</p>
                                    </div>
                                    <div class="font-mono text-sm font-black text-right" style="color: ${pColor}">$${item.precio}</div>
                                </div>
                            </div>`;
                    });
                }

                // Renderizado Módulo: ESPECIALIDADES
                if (db.zones?.especialidades && db.zones.especialidades.length > 0) {
                    document.getElementById('sec-especialidades').classList.remove('hidden');
                    const container = document.getElementById('grid-especialidades');
                    db.zones.especialidades.forEach(item => {
                        container.innerHTML += `
                            <div class="p-4 rounded-xl border border-zinc-900 bg-zinc-900/20 backdrop-blur-sm flex justify-between items-center">
                                <div class="max-w-[75%]">
                                    <h3 class="text-xs font-bold text-zinc-200">${item.nombre}</h3>
                                    <p class="text-[10px] text-zinc-500 mt-0.5 line-clamp-2 font-light">${item.descripcion}</p>
                                </div>
                                <div class="font-mono text-xs font-bold pl-2" style="color: ${pColor}">$${item.precio}</div>
                            </div>`;
                    });
                }

                // Renderizado Módulo: MENÚ DEL DÍA
                if (db.zones?.menu_dia && db.zones.menu_dia.length > 0) {
                    document.getElementById('sec-menudia').classList.remove('hidden');
                    const container = document.getElementById('grid-menudia');
                    db.zones.menu_dia.forEach(item => {
                        container.innerHTML += `
                            <div class="flex justify-between items-center w-full">
                                <div>
                                    <h3 class="text-xs font-bold text-white uppercase tracking-wide">${item.nombre}</h3>
                                    <p class="text-[11px] text-zinc-500 mt-0.5">${item.descripcion}</p>
                                </div>
                                <div class="font-mono text-sm font-black" style="color: ${aColor}">$${item.precio}</div>
                            </div>`;
                    });
                }

                // Encendido de Interfaz con transición cosmética
                loadingEl.classList.add('hidden');
                uiEl.classList.remove('opacity-0');

            } catch (err) {
                loadingEl.innerText = "ERROR // COLISIÓN DE NÚCLEO";
            }
        }

        window.onload = encenderReactor;
    </script>
</body>
</html>
